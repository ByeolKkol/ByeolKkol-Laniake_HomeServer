services:
  db:
    image: postgres:15-alpine
    container_name: chzzk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: byeolkkol
      POSTGRES_DB: chzzk
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chzzk-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://byeolkkol@db:5432/chzzk
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://192.168.1.8:8080}
    volumes:
      - ~/recordings:/app/recordings
      - ./cz-recording/credentials.json:/app/credentials.json:ro
      - ./cz-recording/google_drive_session.json:/app/google_drive_session.json
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - default
      - laniake_homeserver_default

  rog-ctrl-backend:
    build:
      context: ./servercontrol
      dockerfile: Dockerfile
    container_name: rog-ctrl-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /usr/bin/asusctl:/usr/bin/asusctl:ro
      - /run/dbus:/run/dbus:rw
      - /sys/class/power_supply:/sys/class/power_supply:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
      - /sys/class/backlight:/sys/class/backlight:rw
      - /sys:/host/sys:ro
      - /boot/efi:/host/boot/efi:ro
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
      - DATABASE_URL=postgresql://byeolkkol@db:5432/chzzk
    depends_on:
      - db
    privileged: true

  wol-backend:
    build:
      context: ./wolservice
      dockerfile: Dockerfile
    container_name: wol-backend
    restart: unless-stopped
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://192.168.1.8:8080}
    volumes:
      - wol_data:/app/data
    network_mode: host

  iot-backend:
    build:
      context: ./iot-backend
      dockerfile: Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://byeolkkol@db:5432/chzzk
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://192.168.1.8:8080}
    ports:
      - "8093:8093"
    networks:
      - laniake_homeserver_default

  tapo-backend:
    build:
      context: ./tapo-backend
      dockerfile: Dockerfile
    container_name: tapo-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://byeolkkol@db:5432/chzzk
      - TAPO_USERNAME=${TAPO_USERNAME:-}
      - TAPO_PASSWORD=${TAPO_PASSWORD:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://192.168.1.8:8080}
    ports:
      - "8094:8094"
    networks:
      - laniake_homeserver_default

  ai-discussion:
    build:
      context: ./ai-discussion
      dockerfile: Dockerfile
    container_name: ai-discussion
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://byeolkkol@chzzk-db:5432/chzzk
    ports:
      - "8092:8092"
    volumes:
      - ~/.claude:/root/.claude:ro
      - ~/.config/gemini:/root/.config/gemini:ro
    networks:
      - default
      - laniake_homeserver_default


volumes:
  db_data:
    external: true
    name: chzzk-recorder_db_data
  wol_data:
    external: true
    name: chzzk-recorder_wol_data

networks:
  laniake_homeserver_default:
    external: true
